# Configuração de Modelos de Machine Learning

# Modelos a serem treinados
models:
  logistic_regression:
    enabled: true
    params:
      C: 1.0
      max_iter: 1000
      class_weight: balanced
      random_state: 42

  random_forest:
    enabled: true
    params:
      n_estimators: 200
      max_depth: 10
      min_samples_split: 20
      min_samples_leaf: 10
      class_weight: balanced
      random_state: 42
      n_jobs: -1

  xgboost:
    enabled: true
    params:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
      scale_pos_weight: 3
      random_state: 42
      tree_method: hist

  lightgbm:
    enabled: true
    params:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
      is_unbalance: true
      random_state: 42
      verbose: -1

# Validação cruzada
cross_validation:
  n_splits: 5
  shuffle: true
  random_state: 42

# Métricas de avaliação
metrics:
  primary:
    - roc_auc
    - precision_recall_auc
    - f1_score
  secondary:
    - precision
    - recall
    - accuracy
    - brier_score

# Calibração de probabilidades
calibration:
  enabled: true
  methods:
    - platt_scaling
    - isotonic_regression

# Threshold optimization
threshold_optimization:
  enabled: true
  method: cost_based
  search_range: [0.1, 0.9]
  n_thresholds: 100

# Feature selection
feature_selection:
  enabled: true
  methods:
    - mutual_info
    - permutation_importance
    - shap_importance
  top_k_features: 20

# Paths
paths:
  raw_data: data/raw/
  processed_data: data/processed/
  features: data/features/
  models: models/saved_models/
  reports: reports/outputs/
