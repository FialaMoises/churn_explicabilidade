version: '3.8'

services:
  # Dashboard Streamlit
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: churn-dashboard
    ports:
      - "8501:8501"
    volumes:
      # Montar código para desenvolvimento (hot-reload)
      - ./app.py:/app/app.py
      - ./src:/app/src
      - ./config:/app/config
      # Montar dados (persistência)
      - ./data:/app/data
      - ./dataraw:/app/dataraw
      - ./models:/app/models
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    restart: unless-stopped
    networks:
      - churn-network

  # Jupyter Notebook (opcional, para desenvolvimento)
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: churn-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./src:/app/src
      - ./data:/app/data
      - ./dataraw:/app/dataraw
      - ./models:/app/models
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''
    restart: unless-stopped
    networks:
      - churn-network

networks:
  churn-network:
    driver: bridge

volumes:
  data-volume:
  models-volume:
